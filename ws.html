<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Search</title>
  
<style>
:root {
  --bg-color: #dbe7e0;
  --draw-color: #b3d1c2;
  --grid-border: #000;
  --cell-size: 34px;
}

body {
  margin: 0;
  padding: 10px 0px 20px 0px;
  font-family:"Inter",Inter,Arial,sans-serif;
  background: var(--bg-color);
  display: flex;
  justify-content: center;

  overflow-x: hidden;
  overflow-y: auto; /* enable scroll */
}

/* hide scrollbar but keep scroll */
body::-webkit-scrollbar {
  display: none;
}

body {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.app {
  max-width: 100%;
  margin: 0;

  display: flex;
  flex-direction: column;
  align-items: center;

  padding-left: clamp(12px, 4vw, 24px);
  padding-right: clamp(12px, 4vw, 24px);

  box-sizing: border-box;
}

h1 {
  text-align: center;
  margin: 20px 0 12px 0;
  font-size: 20px;
}

.grid-wrapper {
  position: relative;
  padding: 12px;
  width: 100%;
  box-sizing: border-box;
}

.grid {
  display: grid;
  grid-template-columns: repeat(10, var(--cell-size));
  grid-auto-rows: var(--cell-size);
  gap: 4px;
  touch-action: none;
}

.cell {
  background: #fff;
  border: 1px solid var(--grid-border);
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}

svg {
  position: absolute;
  left: 12px;
  top: 12px;
  pointer-events: none;
}

.word-list {
  margin-top: 18px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 24px;
  font-size: 14px;
}

.word {
  position: relative;
}

.word.found::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 50%;
  height: 3px;
  background: var(--draw-color);
  transform: translateY(-50%);
  border-radius: 2px;
}

.win-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}

.win-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.win-text {
  color: rgba(255,255,255,0.9);
  font-size: 42px;
  text-align: center;
  font-weight: bold;
  letter-spacing: 1px;
}

  /* ===== FORCE HIDE ALL SCROLLBARS ===== */

/* Chrome / Safari / iOS / Android */
*::-webkit-scrollbar {
  display: none;
}

/* Firefox */
* {
  scrollbar-width: none;
}

/* IE / Edge */
* {
  -ms-overflow-style: none;
}

.dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 12px;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(0,0,0,0.25);
}

.dot.active { background: rgba(0,0,0,0.6); }
</style>
</head>

<body>
<div class="app">

<div class="dots" id="dots"></div>

<h1 id="gameTitle">Loading...</h1>

<div class="grid-wrapper" id="swipeArea">
  <div class="grid" id="grid"></div>
  <svg id="svg"></svg>
  </div>

<div class="word-list" id="wordList"></div>

  <div id="winOverlay" class="win-overlay">
  <div class="win-text">
    <div>Awesome</div>
    <div>Completed</div>
    <div style="font-size:16px; margin-top:15px; font-weight:400;">
      Tap to continue
    </div>
  </div>
</div>
  
</div>

<script>
const SUPABASE_URL = "https://tppyzexttkuvcobbbmaz.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_VZiTsc0JGVx6tVf2Zu-9uQ_-FwjGpQW";

const COLS = 10;
const CELL = 34;
const GAP = 4;

let games = [];
let currentIndex = 0;
let isSwipingGrid = false;

let LETTERS = [];
let WORDS = [];

const grid = document.getElementById("grid");
const svg = document.getElementById("svg");
const wordList = document.getElementById("wordList");
const overlay = document.getElementById("overlayText");
const dotsEl = document.getElementById("dots");


  document.getElementById("winOverlay").addEventListener("click", () => {
  document.getElementById("winOverlay").classList.remove("show");
  nextGame(); // go to next puzzle
});

  
async function loadGames() {
  const response = await fetch(
    `${SUPABASE_URL}/rest/v1/GamesWordSearch?active=eq.true&type=eq.20&order=startdate.desc`,
    {
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`
      }
    }
  );

  games = await response.json();

  if (!games.length) {
    document.getElementById("gameTitle").textContent = "No Games Found";
    return;
  }

  initGame(0);
  buildDots();
}

function initGame(index) {
  currentIndex = index;
  const game = games[index];

  LETTERS = game.gridlettersjson.flat();
  WORDS = game.wordjson;

  document.documentElement.style.setProperty('--bg-color', game.bgcolor);
  document.documentElement.style.setProperty('--draw-color', game.drawcolor);
  document.documentElement.style.setProperty('--grid-border', game.gridcolor);

  document.getElementById("gameTitle").textContent = game.name;

  buildGrid();
  buildWords();
  updateDots();
}

function buildGrid() {
  grid.innerHTML = "";
  svg.innerHTML = "";

  LETTERS.forEach((l, i) => {
    const c = document.createElement("div");
    c.className = "cell";
    c.textContent = l;
    c.dataset.index = i;
    grid.appendChild(c);
  });

  const rows = LETTERS.length / COLS;
  svg.setAttribute("width", COLS * CELL + (COLS - 1) * GAP);
  svg.setAttribute("height", rows * CELL + (rows - 1) * GAP);
}

function buildWords() {
  wordList.innerHTML = "";
  WORDS.forEach(w => {
    const el = document.createElement("div");
    el.className = "word";
    el.id = "word-" + w;
    el.textContent = w;
    wordList.appendChild(el);
  });
}

function buildDots() {
  dotsEl.innerHTML = "";
  games.forEach((_, i) => {
    const dot = document.createElement("div");
    dot.className = "dot";
    dotsEl.appendChild(dot);
  });
}

function updateDots() {
  document.querySelectorAll(".dot").forEach((dot, i) => {
    dot.classList.toggle("active", i === currentIndex);
  });
}

function nextGame() {
  let next = (currentIndex + 1) % games.length;
  initGame(next);
}

function prevGame() {
  let prev = (currentIndex - 1 + games.length) % games.length;
  initGame(prev);
}

  /* ===== PUZZLE SWITCHING (SWIPE BETWEEN GAMES) ===== */

let swipeStartX = 0;
let swipeStartY = 0;

const swipeArea = document.querySelector(".app");
const gridElement = document.getElementById("grid");

swipeArea.addEventListener("touchstart", e => {

  // if touch starts inside grid we let puzzle logic handle it
  if (gridElement.contains(e.target)) return;

  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;

}, { passive: true });

swipeArea.addEventListener("touchend", e => {

  if (gridElement.contains(e.target)) return;

  const endX = e.changedTouches[0].clientX;
  const diffX = endX - swipeStartX;

  if (Math.abs(diffX) < 60) return;

  if (diffX > 0) prevGame();
  else nextGame();

}, { passive: true });

/* ===== YOUR ORIGINAL GAME LOGIC BELOW (UNCHANGED) ===== */

let startIndex = null;
let direction = null;
let path = [];
let line = null;

function indexToRC(i) {
  return { r: Math.floor(i / COLS), c: i % COLS };
}

function getDir(a, b) {
  const dr = b.r - a.r;
  const dc = b.c - a.c;

  if (dr === 0 && dc >= 1) return { dr: 0, dc: 1 };   // →
  if (dc === 0 && dr >= 1) return { dr: 1, dc: 0 };   // ↓
  if (dr >= 1 && dc >= 1) return { dr: 1, dc: 1 };    // ↘
  if (dr >= 1 && dc <= -1) return { dr: 1, dc: -1 };  // ↙

  return null;
}

function getCellAt(x, y) {
  const el = document.elementFromPoint(x, y);
  return el?.classList.contains("cell") ? el : null;
}

function cellCenter(i) {
  const { r, c } = indexToRC(i);
  return {
    x: c * (CELL + GAP) + CELL / 2,
    y: r * (CELL + GAP) + CELL / 2
  };
}

function start(x, y) {
  isSwipingGrid = true;

  const cell = getCellAt(x, y);
  if (!cell) {
    isSwipingGrid = false;
    return;
  }

  startIndex = Number(cell.dataset.index);
  path = [startIndex];
  direction = null;

  const p = cellCenter(startIndex);

  line = document.createElementNS("http://www.w3.org/2000/svg", "line");
  line.setAttribute("x1", p.x);
  line.setAttribute("y1", p.y);
  line.setAttribute("x2", p.x);
  line.setAttribute("y2", p.y);
  line.setAttribute("stroke", "var(--draw-color)");
  line.setAttribute("stroke-width", "6");
  line.setAttribute("stroke-linecap", "round");
  line.setAttribute("stroke-opacity", "0.6");

  svg.appendChild(line);
}

function move(x, y) {
  if (!line) return;
  const cell = getCellAt(x, y);
  if (!cell) return;

  const idx = Number(cell.dataset.index);
  if (path.includes(idx)) return;

  const last = indexToRC(path[path.length - 1]);
  const curr = indexToRC(idx);

  if (!direction) {
    direction = getDir(indexToRC(startIndex), curr);
    if (!direction) return;
  }

  if (
    curr.r === last.r + direction.dr &&
    curr.c === last.c + direction.dc
  ) {
    path.push(idx);
    const p = cellCenter(idx);
    line.setAttribute("x2", p.x);
    line.setAttribute("y2", p.y);
  }
}

function end() {
  if (!line) {
    isSwipingGrid = false;
    return;
  }

  const word = path.map(i => LETTERS[i]).join("");

  if (WORDS.includes(word)) {
    document.getElementById("word-" + word)?.classList.add("found");

    const allFound = WORDS.every(w =>
      document.getElementById("word-" + w)?.classList.contains("found")
    );

   if (allFound) {
  setTimeout(() => {
    document.getElementById("winOverlay").classList.add("show");
  }, 500);
}
  } else {
    line.remove();
  }

  line = null;
  path = [];
  direction = null;
  startIndex = null;
  isSwipingGrid = false;
}

/* ===== GRID DRAWING INPUT (PUZZLE ONLY) ===== */

grid.addEventListener("mousedown", e => start(e.clientX, e.clientY));
grid.addEventListener("mousemove", e => move(e.clientX, e.clientY));
grid.addEventListener("mouseup", end);

grid.addEventListener("touchstart", e => {
  start(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });

grid.addEventListener("touchmove", e => {
  e.preventDefault();
  move(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

grid.addEventListener("touchend", end);

loadGames();
</script>
</body>
</html>
