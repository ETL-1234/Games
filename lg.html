<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Letter Garden</title>

<style>

:root{
--bg-color:#dbe7e0;
--letter-bg:#ffffff;
--word-bg:rgba(255,255,255,0.4);
--font-letter:#000;
--font-word:#000;
--btnA:#a8c5b5;
--btnB:#7fa895;
--btnFont:#000;
--cell-size:36px;
}

body {
  margin: 0;
  padding: 10px 0px 20px 0px;
  font-family:"Inter",Inter,Arial,sans-serif;
  background: var(--bg-color);
  display: flex;
  justify-content: center;
  overflow-x: hidden;
  overflow-y: hidden;
  position: relative;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.25);
  pointer-events:none;
  z-index:0;
}

.app{
  position:relative;
  z-index:1;
}

.app{
width:100%;
max-width:420px;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
position:relative;
background-size:cover;
background-position:center;
}

  .win-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 20;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}

.win-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.win-text {
  color: rgba(255,255,255,0.9);
  font-size: 42px;
  text-align: center;
  font-weight: bold;
  letter-spacing: 1px;
}
/* ---------- swipe dots ---------- */

.dots{
position:absolute;
top:8px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:rgba(0,0,0,0.25);
}

.dot.active{
background:rgba(0,0,0,0.7);
}

/* ---------- header ---------- */

.header{
margin-top:30px;
width:90%;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:24px;
font-weight:600;
}

.score{
font-size:24px;
}

/* ---------- word grid ---------- */

#wordGrid{
margin-top:20px;
display:grid !important;
gap:6px;
justify-content:center;
}

.word-cell{
aspect-ratio:1;
width:var(--cell-size);
height:var(--cell-size);
display:flex;
align-items:center;
justify-content:center;
background:var(--word-bg);
color:var(--font-word);
border-radius:6px;
font-weight:600;
font-size:20px;
}

  @keyframes bonusGlow{
0%{box-shadow:0 0 0px #ffffff;}
50%{box-shadow:0 0 20px #ffffff;}
100%{box-shadow:0 0 0px #ffffff;}
}

.bonus-glow{
animation:bonusGlow 0.6s ease;
}
  
/* ---------- letters ---------- */

.letters{
margin-top:auto;
display:flex;
gap:10px;
margin-bottom:14px;
}

.letter{
width:44px;
height:44px;
background:var(--letter-bg);
color:var(--font-letter);
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
font-size:20px;
font-weight:700;
}

/* ---------- buttons ---------- */

.buttons{
display:flex;
gap:10px;
margin-bottom:20px;
}

  .btn{
height:var(--cell-size);
display:flex;
align-items:center;
justify-content:center;
padding:0 14px;
border-radius:8px;
font-size:20px;
}

.btn.easy{
background:var(--btnA);
color:var(--btnFont);
}

.btn.challenge{
background:var(--btnB);
color:var(--btnFont);
}

   .undo{
height:var(--cell-size);
display:flex;
align-items:center;
justify-content:center;
padding:0 14px;
border-radius:8px;
border:1px solid white;
color:white;
cursor:pointer;
background:rgba(255,255,255,0.1);
font-weight:600;
font-size:20px;
user-select:none;
margin-top:8px;
margin-bottom:12px;
}

</style>
</head>

<body>

<div class="app" id="app">

<div class="dots" id="dots"></div>

<div class="header">
<div class="title" id="gameTitle">Loading...</div>
<div class="score" id="score">00</div>
</div>


<div class="word-grid" id="wordGrid"></div>
<div class="undo" id="undoBtn">UNDO</div>
<div class="letters" id="letters"></div>

  
<div class="buttons">
<div class="btn easy" id="btnEasy">Easy</div>
<div class="btn challenge" id="btnChallenge">Challenge</div>
</div>


  <div id="winOverlay" class="win-overlay">
  <div class="win-text">
    <div id="finalScore" style="font-weight:400; font-size:32px; margin-bottom:10px;"></div>
    <div>Awesome</div>
    <div>Completed</div>
    <div style="font-size:16px; margin-top:15px; font-weight:400;">
      Tap to continue
    </div>
  </div>
</div>
  
</div>


<script>

/* ================================
SUPABASE
================================ */

const SUPABASE_URL="https://tppyzexttkuvcobbbmaz.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_VZiTsc0JGVx6tVf2Zu-9uQ_-FwjGpQW";

let games=[];
let sets=[];
let currentSetIndex=0;
let currentGame=null;
let currentIndex = 0;

/* ================================
GAME STATE
================================ */

let currentLetters=[];
let words=[];
let foundWords=[];
let bonusWords=[];
let score=0;
let targetWords = 0;
let gameCompleted = false;

/* ================================
DOM
================================ */

const app=document.getElementById("app");
const title=document.getElementById("gameTitle");
const scoreEl=document.getElementById("score");
const wordGrid=document.getElementById("wordGrid");
const lettersEl=document.getElementById("letters");
const dotsEl=document.getElementById("dots");

let activeCells=[];

  const undoBtn=document.getElementById("undoBtn");

undoBtn.addEventListener("click",()=>{
  if(activeCells.length===0) return;
  const last=activeCells.pop();
  last.textContent="";
});

  const btnEasy=document.getElementById("btnEasy");
const btnChallenge=document.getElementById("btnChallenge");

btnEasy.addEventListener("click",()=>{
  if(!currentGame) return;
  const setId=currentGame.gameid.substring(0,4);
  const easyGame=games.find(g=>g.gameid===setId+"a");
  initGame(games.indexOf(easyGame));
});

btnChallenge.addEventListener("click",()=>{
  if(!currentGame) return;
  const setId=currentGame.gameid.substring(0,4);
  const challengeGame=games.find(g=>g.gameid===setId+"b");
  initGame(games.indexOf(challengeGame));
});


  document.getElementById("winOverlay").addEventListener("click", () => {
  document.getElementById("winOverlay").classList.remove("show");
  nextGame(); // go to next set
});
  
/* ================================
LOAD GAMES
================================ */

async function loadGames(){

const res=await fetch(
`${SUPABASE_URL}/rest/v1/lettergarden_current?order=effective_orderby.asc`,
{
headers:{
apikey:SUPABASE_ANON_KEY,
Authorization:`Bearer ${SUPABASE_ANON_KEY}`
}
});

games=await res.json();
/* group game sets */
sets=[...new Set(games.map(g=>g.gameid.substring(0,4)))];

if(!games.length){
title.textContent="No Games";
return;
}

 
buildDots();
loadSet(0);

}

  

/* ================================
INIT GAME
================================ */

  function loadSet(i){

currentSetIndex=i;

const setId=sets[i];

const easyGame=games.find(g=>g.gameid===setId+"a");

initGame(games.indexOf(easyGame));

}
  
function initGame(i){

currentIndex=i;
const game=games[i];
currentGame=game;

gameCompleted = false;

  
  // determine completion target
if(game.gameid.endsWith("a")){
  targetWords = 15; // easy
} else {
  targetWords = 18; // challenge
}

title.textContent=game.name;

app.style.backgroundImage=`url(${game.bgimageurl})`;

document.documentElement.style.setProperty('--letter-bg',game.bgcolorletter);
document.documentElement.style.setProperty('--word-bg',game.bgcolorword);
document.documentElement.style.setProperty('--font-letter',game.fontcolorletter);
document.documentElement.style.setProperty('--font-word',game.fontcolorword);
document.documentElement.style.setProperty('--btnA',game.bgcolorbuttona);
document.documentElement.style.setProperty('--btnB',game.bgcolorbuttonb);
document.documentElement.style.setProperty('--btnFont',game.fontcolorbutton);

currentLetters = Array.isArray(game.letterjson)
  ? game.letterjson
  : JSON.parse(game.letterjson);

words = Array.isArray(game.wordjson)
  ? game.wordjson
  : JSON.parse(game.wordjson);

bonusWords = Array.isArray(game.bonuswordsjson)
  ? game.bonuswordsjson
  : JSON.parse(game.bonuswordsjson || "[]");
  
foundWords=[];
score=0;
activeCells=[];

scoreEl.textContent="00";

buildWordGrid();
buildLetters();
updateDots();

document.getElementById("winOverlay").classList.remove("show");
document.getElementById("finalScore").textContent = "";
  
}

/* ================================
BUILD WORD GRID
================================ */

  function buildWordGrid(){

  wordGrid.innerHTML="";
  wordGrid.style.display="grid";

  let cols = 8;
  let rows = 18;

  if(currentGame && currentGame.maxletters == 6){
    cols = 6;
    rows = 15;
  }

  /* tell CSS how many columns */
 wordGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`

  /* flatten words into grid */
  const cells = [];

  words.forEach(word=>{
    word.split("").forEach(letter=>{
      cells.push({letter:letter, word:word});
    });
  });

  /* fill remaining spaces */
  const total = cols * rows;

  while(cells.length < total){
    cells.push(null);
  }

  /* build grid */
  cells.slice(0,total).forEach(data=>{

    const cell=document.createElement("div");
    cell.className="word-cell";

    if(data){
      cell.dataset.letter=data.letter;
      cell.dataset.word=data.word;
    }

    wordGrid.appendChild(cell);

  });

}
/* ================================
LETTERS
================================ */

function buildLetters(){

lettersEl.innerHTML="";

currentLetters.forEach(letter=>{

const el=document.createElement("div");
el.className="letter";
el.textContent=letter;

el.addEventListener("click",()=>placeLetter(letter));

lettersEl.appendChild(el);

});

}

function placeLetter(letter){

const empty=[...document.querySelectorAll(".word-cell")]
.find(c=>!c.textContent && !c.dataset.locked);

if(!empty) return;

empty.textContent=letter;
activeCells.push(empty);

checkWords();

}

/* ================================
WORD CHECK
================================ */
function checkWords(){

  const cells=[...document.querySelectorAll(".word-cell")];

  let cols = 8;
  if(currentGame && currentGame.maxletters == 6){
    cols = 6;
  }

  let newWordFound = false;

  for(let r=0;r<cells.length;r+=cols){

    let word="";
    let rowCells=cells.slice(r,r+cols);

    rowCells.forEach(c=>{
      word+=c.textContent||"";
    });

    if(words.includes(word) && !foundWords.includes(word)){

      if(bonusWords.includes(word)){
        triggerBonusGlow(rowCells);
      }

      foundWords.push(word);
      newWordFound = true;

      rowCells.forEach(c=>{
        c.style.background="rgba(0,0,0,0.15)";
        c.dataset.locked = "true";
      });

      score+=word.length-1;
      scoreEl.textContent=String(score).padStart(2,"0");
    }
  }

  // ✅ NOW CHECK COMPLETION ONCE (after loop)
if(!gameCompleted && foundWords.length >= targetWords){

  gameCompleted = true;

  document.getElementById("finalScore").textContent =
    `Score ${score}`;

  setTimeout(() => {
    document.getElementById("winOverlay").classList.add("show");
  }, 500);
}
}

  function triggerBonusGlow(cells){

cells.forEach(c=>{
  c.classList.add("bonus-glow");

  setTimeout(()=>{
    c.classList.remove("bonus-glow");
  },600);

});

}

/* ================================
DOTS
================================ */

function buildDots(){

dotsEl.innerHTML="";

sets.forEach(()=>{

const d=document.createElement("div");
d.className="dot";
dotsEl.appendChild(d);

});

}

function updateDots(){

document.querySelectorAll(".dot")
.forEach((d,i)=>{
d.classList.toggle("active",i===currentSetIndex);
});

}

/* ================================
SWIPE BETWEEN SETS
================================ */

let startX=0;

app.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
},{passive:true});

app.addEventListener("touchend",e=>{

const diff=e.changedTouches[0].clientX-startX;

if(Math.abs(diff)<60) return;

if(diff<0) nextGame();
else prevGame();

},{passive:true});

function nextGame(){

currentSetIndex=(currentSetIndex+1)%sets.length;
loadSet(currentSetIndex);

}

  function prevGame(){

currentSetIndex=(currentSetIndex-1+sets.length)%sets.length;
loadSet(currentSetIndex);

}

/* ================================
START
================================ */

loadGames();

</script>

</body>
</html>
